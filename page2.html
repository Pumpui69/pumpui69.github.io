    <style>
        body { 
            color: #334155; 
            background-color: #f8fafc;
            overflow: hidden; /* Prevent body scroll, let the app scroll */
        }

        /* Ambient Animated Background */
        .ambient-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 50%, #f0fdf4 100%);
            z-index: -2;
        }
        
        .blob {
            position: fixed; filter: blur(80px); z-index: -1; opacity: 0.4;
            animation: moveBlobs 25s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }
        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #e0e7ff; }
        .blob-2 { bottom: -10%; right: -10%; width: 40vw; height: 40vw; background: #dcfce7; animation-delay: -12s; }

        @keyframes moveBlobs {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.1); }
        }
        
        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }

        .glass-dark {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(203, 213, 225, 0.6); border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.8); }
        
        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }

        .biz-step { position: relative; padding-left: 1.75rem; margin-bottom: 0.75rem; font-size: 0.875rem; color: #475569;}
        .biz-step::before { content: '\f058'; font-family: 'Font Awesome 6 Free'; font-weight: 900; position: absolute; left: 0; top: 0.15rem; color: #10b981; font-size: 1rem; }
        .biz-step strong { color: #1e293b; }

        /* Animation */
        @keyframes pulse-fast { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-fast { animation: pulse-fast 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes scaleX { 0% { transform: scaleX(0); } 50% { transform: scaleX(1); } 100% { transform: scaleX(0); transform-origin: right; } }
    </style>
</head>

        // --- Calculate Margin function for Stage 2 (CPQ) ---
        window.calculateMargin = function() {
            // Get R&D Formulation Values
            const textureCost = parseFloat(document.getElementById('cpq-texture')?.value || 500);
            const activesCost = parseFloat(document.getElementById('cpq-actives')?.value || 2500);
            const scentCost = parseFloat(document.getElementById('cpq-scent')?.value || 200);
            
            // Get Size Value from Radio buttons
            let sizeVal = 0.030; // Default 30ml
            const sizeRadios = document.getElementsByName('cpq-size');
            if(sizeRadios) {
                for(const radio of sizeRadios) {
                    if(radio.checked) sizeVal = parseFloat(radio.value);
                }
            }

            // Get Packaging Values
            const primaryCost = parseFloat(document.getElementById('cpq-primary')?.value || 35);
            const secondaryCost = parseFloat(document.getElementById('cpq-secondary')?.value || 15);
            
            // Get Target Retail Price
            const retailPrice = parseFloat(document.getElementById('cpq-price')?.value || 890);

            // Real-time Cost Calculation Engine
            const formulaCostPerKg = textureCost + activesCost + scentCost; // Cost of liquid bulk per Kg
            const formulaCostPerUnit = formulaCostPerKg * sizeVal; // Liquid bulk cost per unit (e.g. 30g = 0.03kg)
            const totalCostPerUnit = formulaCostPerUnit + primaryCost + secondaryCost; // Total Bill of Materials (BOM)
            
            // Margin Calculation
            const margin = retailPrice - totalCostPerUnit;
            const marginPercent = retailPrice > 0 ? (margin / retailPrice) * 100 : 0;

            // Update UI Elements
            const costEl = document.getElementById('cpq-unit-cost');
            const marginEl = document.getElementById('cpq-margin');
            const marginStatusEl = document.getElementById('cpq-margin-status');

            if(costEl) {
                costEl.innerText = '฿' + totalCostPerUnit.toFixed(2);
            }

            if(marginEl) {
                marginEl.innerText = marginPercent.toFixed(1) + '%';
                
                // Dynamic Color Formatting based on margin health
                if(marginPercent > 60) {
                    marginEl.className = 'text-xl font-bold text-emerald-500 transition-colors leading-none';
                    if(marginStatusEl) marginStatusEl.innerHTML = '<div class="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-1 rounded font-bold"><i class="fa-solid fa-check-circle mr-1"></i> High Margin</div>';
                } else if(marginPercent > 30) {
                    marginEl.className = 'text-xl font-bold text-amber-500 transition-colors leading-none';
                    if(marginStatusEl) marginStatusEl.innerHTML = '<div class="text-[10px] bg-amber-100 text-amber-700 px-2 py-1 rounded font-bold"><i class="fa-solid fa-exclamation-triangle mr-1"></i> Acceptable Margin</div>';
                } else {
                    marginEl.className = 'text-xl font-bold text-rose-500 transition-colors leading-none';
                    if(marginStatusEl) marginStatusEl.innerHTML = '<div class="text-[10px] bg-rose-100 text-rose-700 px-2 py-1 rounded font-bold"><i class="fa-solid fa-xmark-circle mr-1"></i> Low Margin (Risk)</div>';
                }
            }
        };
